<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>👑 Plataforma - APP de Serviço</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Config Firebase -->
    <script src="firebase-config.js"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#4ecdc4" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #1a1a2e;
        --bg-card: #2a2a40;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --accent: #ff6b6b;
        --secondary: #4ecdc4;
        --warning: #ff9800;
        --danger: #f44336;
        --success: #4caf50;
        --info: #2196f3;
        --border: #404040;
      }

      body {
        background: linear-gradient(
          135deg,
          var(--bg-primary),
          var(--bg-secondary)
        );
        min-height: 100vh;
        padding: 20px;
        color: var(--text-primary);
        font-size: 14px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      /* Header */
      .header {
        background: rgba(26, 26, 46, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 107, 107, 0.3);
        box-shadow: 0 0 30px rgba(255, 107, 107, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }

      .header h1 {
        font-size: clamp(20px, 3vw, 28px);
        display: flex;
        align-items: center;
        gap: 10px;
        text-shadow: 0 0 10px var(--accent);
      }

      .status-bar {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .status-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 15px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 30px;
        font-size: 13px;
      }

      /* Cards de Estatísticas */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 20px;
      }

      .stat-card {
        background: var(--bg-card);
        border-radius: 15px;
        padding: 20px;
        border-left: 4px solid var(--accent);
      }

      .stat-card h3 {
        color: var(--text-secondary);
        font-size: 13px;
        margin-bottom: 10px;
      }

      .stat-card .value {
        font-size: 28px;
        font-weight: bold;
        color: var(--accent);
      }

      /* Botões */
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }

      .btn-primary {
        background: var(--accent);
        color: white;
      }

      .btn-primary:hover {
        background: #ff5252;
        transform: translateY(-2px);
      }

      .btn-success {
        background: var(--success);
        color: white;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--accent);
        color: var(--accent);
      }

      .btn-outline:hover {
        background: var(--accent);
        color: black;
      }

      .btn-sm {
        padding: 5px 10px;
        font-size: 12px;
      }

      /* Tabela */
      .table-container {
        background: var(--bg-card);
        border-radius: 20px;
        padding: 20px;
        overflow-x: auto;
      }

      .table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .table-header h2 {
        color: var(--accent);
        font-size: 18px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        padding: 15px 10px;
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 12px;
        border-bottom: 1px solid #404040;
      }

      td {
        padding: 15px 10px;
        border-bottom: 1px solid #303030;
      }

      tr:hover td {
        background: rgba(255, 107, 107, 0.05);
      }

      .status-badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: bold;
        display: inline-block;
      }

      .status-ativo {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
        border: 1px solid #4caf50;
      }

      .status-suspenso {
        background: rgba(255, 152, 0, 0.2);
        color: #ff9800;
        border: 1px solid #ff9800;
      }

      .status-bloqueado {
        background: rgba(244, 67, 54, 0.2);
        color: #f44336;
        border: 1px solid #f44336;
      }

      .action-icon {
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 12px;
        background: rgba(255, 255, 255, 0.05);
        margin: 0 2px;
      }

      .action-icon:hover {
        background: var(--accent);
        color: black;
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background: var(--bg-card);
        border-radius: 20px;
        padding: 30px;
        max-width: 500px;
        width: 90%;
        border-left: 5px solid var(--accent);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .modal-header h2 {
        color: var(--accent);
        font-size: 20px;
      }

      .modal-close {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 600;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 12px;
        background: var(--bg-secondary);
        border: 1px solid #404040;
        border-radius: 8px;
        color: white;
        font-size: 14px;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--accent);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .modal-footer {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .search-box {
        padding: 10px 15px;
        background: var(--bg-secondary);
        border: 1px solid #404040;
        border-radius: 8px;
        color: white;
        min-width: 250px;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: var(--accent);
      }

      .loading-spinner {
        border: 3px solid rgba(255, 107, 107, 0.1);
        border-top: 3px solid var(--accent);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .w-100 {
        width: 100%;
      }
      .flex {
        display: flex;
        gap: 10px;
      }
      .mt-20 {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- HEADER -->
      <div class="header">
        <div>
          <h1><i class="fas fa-crown"></i> PLATAFORMA - APP DE SERVIÇO</h1>
          <div style="font-size: 12px; color: var(--text-secondary)">
            Gestão de empresas e planos
          </div>
        </div>
        <div class="status-bar">
          <div class="status-item" id="firebaseStatus">🔄 Conectando...</div>
          <div class="status-item" id="totalEmpresas">🏢 Empresas: 0</div>
          <button
            class="btn btn-primary btn-sm"
            onclick="mostrarModalEmpresa()"
          >
            <i class="fas fa-plus"></i> Nova Empresa
          </button>
        </div>
      </div>

      <!-- ESTATÍSTICAS -->
      <div class="stats-grid" id="statsContainer">
        <div class="loading">
          <div class="loading-spinner"></div>
          Carregando estatísticas...
        </div>
      </div>

      <!-- TABELA DE EMPRESAS -->
      <div class="table-container">
        <div class="table-header">
          <h2><i class="fas fa-building"></i> Empresas Cadastradas</h2>
          <div>
            <input
              type="text"
              class="search-box"
              id="buscarEmpresa"
              placeholder="🔍 Buscar empresa..."
              onkeyup="filtrarEmpresas()"
            />
          </div>
        </div>

        <div id="empresasLista">
          <div class="loading">
            <div class="loading-spinner"></div>
            Carregando empresas...
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL EMPRESA -->
    <div id="modalEmpresa" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>
            <i class="fas fa-building"></i>
            <span id="modalTitulo">Nova Empresa</span>
          </h2>
          <button class="modal-close" onclick="fecharModalEmpresa()">×</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="empresaId" />

          <div class="form-group">
            <label>Nome da Empresa *</label>
            <input
              type="text"
              id="empresaNome"
              class="form-control"
              placeholder="Ex: Serviços Rápidos Ltda"
            />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="empresaEmail"
              class="form-control"
              placeholder="contato@empresa.com"
            />
          </div>

          <div class="form-group">
            <label>Telefone</label>
            <input
              type="text"
              id="empresaTelefone"
              class="form-control"
              placeholder="(00) 00000-0000"
            />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Plano</label>
              <select id="empresaPlano" class="form-control">
                <option value="gratuito">Gratuito</option>
                <option value="basico">Básico</option>
                <option value="profissional">Profissional</option>
                <option value="empresarial">Empresarial</option>
              </select>
            </div>

            <div class="form-group">
              <label>Status</label>
              <select id="empresaStatus" class="form-control">
                <option value="ativo">Ativo</option>
                <option value="suspenso">Suspenso</option>
                <option value="bloqueado">Bloqueado</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Próximo Pagamento</label>
              <input
                type="date"
                id="empresaProximoPagamento"
                class="form-control"
              />
            </div>

            <div class="form-group">
              <label>Valor (R$)</label>
              <input
                type="text"
                id="empresaValor"
                class="form-control"
                placeholder="0,00"
              />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary w-100" onclick="salvarEmpresa()">
            💾 SALVAR
          </button>
          <button class="btn btn-outline w-100" onclick="fecharModalEmpresa()">
            CANCELAR
          </button>
        </div>
      </div>
    </div>

    <script>
              // ============================================
              // VARIÁVEIS GLOBAIS
              // ============================================
              let empresas = [];
              let empresasFiltradas = [];

              // ============================================
              // INICIALIZAÇÃO
              // ============================================
              window.onload = function() {
                  document.getElementById('firebaseStatus').innerHTML = '🟢 Conectado';
                  carregarEmpresas();
                  carregarEstatisticas();

                  // Registrar Service Worker para PWA
                  if ('serviceWorker' in navigator) {
                      navigator.serviceWorker.register('service-worker.js')
                          .then(reg => console.log('Service Worker registrado'))
                          .catch(err => console.log('Erro no Service Worker:', err));
                  }
              };

              // ============================================
              // CARREGAR DADOS
              // ============================================
              function carregarEmpresas() {
                  db.collection('empresas').onSnapshot(snapshot => {
                      empresas = [];
                      snapshot.forEach(doc => {
                          empresas.push({ id: doc.id, ...doc.data() });
                      });
                      empresasFiltradas = [...empresas];
                      atualizarTabela();
                      atualizarTotalEmpresas();
                  });
              }

              async function carregarEstatisticas() {
                  const statsContainer = document.getElementById('statsContainer');

                  try {
                      // Total de empresas
                      const empresasSnapshot = await db.collection('empresas').get();
                      const totalEmpresas = empresasSnapshot.size;

                      // Empresas ativas
                      const ativasSnapshot = await db.collection('empresas').where('status', '==', 'ativo').get();
                      const ativas = ativasSnapshot.size;

                      // Total de OS
                      const osSnapshot = await db.collection('ordens_servico').get();
                      const totalOS = osSnapshot.size;

                      // Total de clientes
                      const clientesSnapshot = await db.collection('clientes').get();
                      const totalClientes = clientesSnapshot.size;

                      statsContainer.innerHTML = `
                          <div class="stat-card">
                              <h3>Total de Empresas</h3>
                              <div class="value">${totalEmpresas}</div>
                          </div>
                          <div class="stat-card">
                              <h3>Empresas Ativas</h3>
                              <div class="value" style="color: var(--success);">${ativas}</div>
                          </div>
                          <div class="stat-card">
                              <h3>Total de OS</h3>
                              <div class="value">${totalOS}</div>
                          </div>
                          <div class="stat-card">
                              <h3>Total de Clientes</h3>
                              <div class="value">${totalClientes}</div>
                          </div>
                      `;
                  } catch (error) {
                      statsContainer.innerHTML = '<div class="stat-card">Erro ao carregar estatísticas</div>';
                  }
              }

              function atualizarTotalEmpresas() {
                  document.getElementById('totalEmpresas').innerHTML = `🏢 Empresas: ${empresas.length}`;
              }

              function atualizarTabela() {
                  const container = document.getElementById('empresasLista');

                  if (empresasFiltradas.length === 0) {
                      container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">📭 Nenhuma empresa cadastrada</div>';
                      return;
                  }

                  let html = '<table><thead><tr><th>EMPRESA</th><th>CONTATO</th><th>PLANO</th><th>STATUS</th><th>PRÓX. PAGAMENTO</th><th>AÇÕES</th></tr></thead><tbody>';

                  empresasFiltradas.forEach(emp => {
                      const statusClass = emp.status === 'ativo' ? 'status-ativo' : emp.status === 'suspenso' ? 'status-suspenso' : 'status-bloqueado';
                      const statusText = emp.status === 'ativo' ? 'ATIVO' : emp.status === 'suspenso' ? 'SUSPENSO' : 'BLOQUEADO';

                      html += `
                          <tr>
                              <td>
                                  <strong>${emp.nome || 'Sem nome'}</strong><br>
                                  <small style="color: var(--text-secondary);">ID: ${emp.id.substring(0, 8)}...</small>
                              </td>
                              <td>
                                  ${emp.email || '-'}<br>
                                  <small>${emp.telefone || '-'}</small>
                              </td>
                              <td>${emp.plano || 'gratuito'}</td>
                              <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                              <td>${emp.proximoPagamento ? AppServico.formatarDataSimples(emp.proximoPagamento) : '-'}</td>
                              <td>
                                  <span class="action-icon" onclick="editarEmpresa('${emp.id}')" title="Editar">✏️</span>
                                  <span class="action-icon" onclick="verDetalhesEmpresa('${emp.id}')" title="Detalhes">📊</span>
                                  <span class="action-icon ${emp.status === 'ativo' ? 'warning' : 'success'}"
                                        onclick="alternarStatus('${emp.id}')"
                                        title="${emp.status === 'ativo' ? 'Suspender' : 'Ativar'}">
                                      ${emp.status === 'ativo' ? '⏸️' : '▶️'}
                                  </span>
                              </td>
                          </tr>
                      `;
                  });

                  html += '</tbody></table>';
                  container.innerHTML = html;
              }

              // ============================================
              // FUNÇÕES DE MODAL
              // ============================================
              function mostrarModalEmpresa(id = null) {
                  document.getElementById('modalTitulo').innerHTML = id ? 'Editar Empresa' : 'Nova Empresa';

                  if (id) {
                      const empresa = empresas.find(e => e.id === id);
                      if (empresa) {
                          document.getElementById('empresaId').value = empresa.id;
                          document.getElementById('empresaNome').value = empresa.nome || '';
                          document.getElementById('empresaEmail').value = empresa.email || '';
                          document.getElementById('empresaTelefone').value = empresa.telefone || '';
                          document.getElementById('empresaPlano').value = empresa.plano || 'gratuito';
                          document.getElementById('empresaStatus').value = empresa.status || 'ativo';
                          document.getElementById('empresaProximoPagamento').value = empresa.proximoPagamento || '';
                          document.getElementById('empresaValor').value = empresa.valor || '';
                      }
                  } else {
                      document.getElementById('empresaId').value = '';
                      document.getElementById('empresaNome').value = '';
                      document.getElementById('empresaEmail').value = '';
                      document.getElementById('empresaTelefone').value = '';
                      document.getElementById('empresaPlano').value = 'gratuito';
                      document.getElementById('empresaStatus').value = 'ativo';
                      document.getElementById('empresaProximoPagamento').value = '';
                      document.getElementById('empresaValor').value = '';
                  }

                  document.getElementById('modalEmpresa').style.display = 'flex';
              }

              function fecharModalEmpresa() {
                  document.getElementById('modalEmpresa').style.display = 'none';
              }

              // ============================================
              // FUNÇÕES DE SEGURANÇA - GERAÇÃO DE TOKENS
              // ============================================

              // Função para gerar token único e seguro para acesso do cliente
              function gerarTokenAcesso() {
                  // Gera token com 32 caracteres aleatórios
                  const parte1 = Math.random().toString(36).substring(2, 15);
                  const parte2 = Math.random().toString(36).substring(2, 15);
                  const parte3 = Math.random().toString(36).substring(2, 15);
                  return parte1 + parte2 + parte3;
              }

              // Função para criar cliente com token (versão completa)
              async function criarClienteComToken(dadosCliente) {
          try {
              // Gerar token único
              const token = gerarTokenAcesso();

              // Adicionar token aos dados do cliente
              const clienteComToken = {
                  ...dadosCliente,
                  acessoToken: token,
                  ativo: true,
                  criadoEm: new Date().toISOString(),
                  atualizadoEm: new Date().toISOString()
              };

              // Salvar no Firestore
              const docRef = await db.collection('clientes').add(clienteComToken);

              // Gerar link de acesso seguro
              const linkAcesso = `${window.location.origin}/app-de-servico/os_cliente.html?cliente=${docRef.id}&token=${token}`;

              console.log('Cliente criado com token:', docRef.id);
              console.log('Link de acesso:', linkAcesso);

              return {
                  id: docRef.id,
                  token: token,
                  linkAcesso: linkAcesso
              };

          } catch (error) {
              console.error('Erro ao criar cliente com token:', error);
              throw error;
          }
      }

                      // Gerar token único
                      const token = gerarTokenAcesso();

                      // Adicionar token aos dados do cliente
                      const clienteComToken = {
                          ...dadosCliente,
                          acessoToken: token,
                          ativo: true,
                          criadoEm: new Date().toISOString(),
                          atualizadoEm: new Date().toISOString()
                      };

                      // Salvar no Firestore
                      const docRef = await db.collection('clientes').add(clienteComToken);

                      // Gerar link de acesso seguro
                      const linkAcesso = `${window.location.origin}/app-de-servico/os_cliente.html?cliente=${docRef.id}&token=${token}`;

                      console.log('Cliente criado com token:', docRef.id);
                      console.log('Link de acesso:', linkAcesso);

                      return {
                          id: docRef.id,
                          token: token,
                          linkAcesso: linkAcesso
                      };

                  } catch (error) {
                      consle.error('Erro ao criar cliente com token:', error);
                      throw error;
                  }
              }

              // ============================================
              // CRUD EMPRESAS
              // ============================================
              async function salvarEmpresa() {
                  const nome = document.getElementById('empresaNome').value.trim();
                  if (!nome) return AppServico.erro('Nome da empresa obrigatório');

                  const dados = {
                      nome: nome,
                      email: document.getElementById('empresaEmail').value,
                      telefone: document.getElementById('empresaTelefone').value,
                      plano: document.getElementById('empresaPlano').value,
                      status: document.getElementById('empresaStatus').value,
                      proximoPagamento: document.getElementById('empresaProximoPagamento').value || null,
                      valor: document.getElementById('empresaValor').value,
                      atualizadoEm: new Date().toISOString()
                  };

                  const id = document.getElementById('empresaId').value;

                  try {
                      if (id) {
                          await db.collection('empresas').doc(id).update(dados);
                          AppServico.sucesso('Empresa atualizada!');
                      } else {
                          dados.dataCriacao = new Date().toISOString();
                          dados.ultimoPagamento = null;
                          await db.collection('empresas').add(dados);
                          AppServico.sucesso('Empresa criada!');
                      }
                      fecharModalEmpresa();
                      carregarEstatisticas();
                  } catch (error) {
                      AppServico.erro('Erro: ' + error.message);
                  }
              }

              async function alternarStatus(id) {
                  const empresa = empresas.find(e => e.id === id);
                  if (!empresa) return;

                  let novoStatus;
                  if (empresa.status === 'ativo') novoStatus = 'suspenso';
                  else if (empresa.status === 'suspenso') novoStatus = 'ativo';
                  else novoStatus = 'ativo';

                  if (!AppServico.confirmar(`Alterar status para ${novoStatus}?`)) return;

                  try {
                      await db.collection('empresas').doc(id).update({
                          status: novoStatus,
                          atualizadoEm: new Date().toISOString()
                      });
                      AppServico.sucesso(`Status alterado para ${novoStatus}`);
                  } catch (error) {
                      AppServico.erro('Erro: ' + error.message);
                  }
              }

              function editarEmpresa(id) {
                  mostrarModalEmpresa(id);
              }

              async function verDetalhesEmpresa(id) {
                  const empresa = empresas.find(e => e.id === id);

                  try {
                      // Contar OS da empresa
                      const osSnapshot = await db.collection('ordens_servico')
                          .where('empresaId', '==', id)
                          .get();

                      // Contar clientes da empresa
                      const clientesSnapshot = await db.collection('clientes')
                          .where('empresaId', '==', id)
                          .get();

                      // Contar técnicos da empresa
                      const tecnicosSnapshot = await db.collection('tecnicos')
                          .where('empresaId', '==', id)
                          .get();

                      alert(`📊 Detalhes da Empresa\n\n` +
                            `Empresa: ${empresa.nome}\n` +
                            `Total de OS: ${osSnapshot.size}\n` +
                            `Total de Clientes: ${clientesSnapshot.size}\n` +
                            `Total de Técnicos: ${tecnicosSnapshot.size}\n` +
                            `Plano: ${empresa.plano}\n` +
                            `Status: ${empresa.status}`);
                  } catch (error) {
                      AppServico.erro('Erro ao carregar detalhes');
                  }
              }

              function filtrarEmpresas() {
                  const termo = document.getElementById('buscarEmpresa').value.toLowerCase();
                  empresasFiltradas = empresas.filter(e =>
                      e.nome?.toLowerCase().includes(termo) ||
                      e.email?.toLowerCase().includes(termo)
                  );
                  atualizarTabela();
              }
    </script>
  </body>

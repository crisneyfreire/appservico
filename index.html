<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP de Serviço</title>
    
    <!-- Redirecionamento automático -->
    <meta http-equiv="refresh" content="0; url=/appservico/painel_servicos.html">
    
    <!-- PWA -->
    <link rel="manifest" href="/appservico/manifest.json">
    <meta name="theme-color" content="#4ecdc4">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .loader {
            text-align: center;
            color: white;
        }
        
        .loader i {
            color: #4ecdc4;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .loader p {
            color: #b0b0b0;
            font-size: 14px;
        }
        
        .loading-spinner {
            border: 3px solid rgba(78, 205, 196, 0.1);
            border-top: 3px solid #4ecdc4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="loader">
        <i class="fas fa-tools"></i>
        <h2 style="color: #4ecdc4; margin-bottom: 10px;">APP de Serviço</h2>
        <div class="loading-spinner"></div>
        <p>Redirecionando para o painel...</p>
    </div>
    
    <script>
        // Fallback caso o meta refresh não funcione
        setTimeout(function() {
            window.location.href = '/appservico/painel_servicos.html';
        }, 2000);
        
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/appservico/service-worker.js')
                    .then(reg => console.log('Service Worker registrado:', reg.scope))
                    .catch(err => console.log('Erro no Service Worker:', err));
            });
        }
    </script>
</body>
</html>
